<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJ Gigs | Malshan Perera</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/dj.css">
</head>
<body>

  <!-- HERO -->
  <div class="dj-hero">
    <video class="dj-hero-video" autoplay muted loop playsinline>
      <source src="../assets/videos/dj/djbackground.mp4" type="video/mp4">
    </video>
    <div class="dj-hero-overlay">
      <h1>MALSHANO</h1>
      <p>Live sets &amp; gig highlights</p>
    </div>
  </div>

  <!-- NAV -->
  <nav>
    <a href="../">Home</a>
    <a href="../#music">Music</a>
    <a href="../#filmmaking">Films</a>
    <a href="../#projects">Projects</a>
  </nav>

  <!-- VIDEO GIGS -->
  <div class="section-label">
    <h2>Gig Highlights</h2>
    <p>Click a card to reveal &amp; play</p>
  </div>

  <div class="gig-grid">

    <div class="gig-card" onclick="revealCard(this)">
      <video autoplay muted loop playsinline>
        <source src="../assets/videos/dj/dj1.mp4" type="video/mp4">
      </video>
      <div class="gig-reveal-hint">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16" fill="white" stroke="none"/></svg>
        <span>Click to reveal</span>
      </div>
      <div class="gig-card-label">Gig 01</div>
    </div>

    <div class="gig-card" onclick="revealCard(this)">
      <video autoplay muted loop playsinline>
        <source src="../assets/videos/dj/dj2.mp4" type="video/mp4">
      </video>
      <div class="gig-reveal-hint">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16" fill="white" stroke="none"/></svg>
        <span>Click to reveal</span>
      </div>
      <div class="gig-card-label">Gig 02</div>
    </div>

    <div class="gig-card" onclick="revealCard(this)">
      <video autoplay muted loop playsinline>
        <source src="../assets/videos/dj/dj3.mp4" type="video/mp4">
      </video>
      <div class="gig-reveal-hint">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16" fill="white" stroke="none"/></svg>
        <span>Click to reveal</span>
      </div>
      <div class="gig-card-label">Gig 03</div>
    </div>

    <div class="gig-card" onclick="revealCard(this)">
      <video autoplay muted loop playsinline>
        <source src="../assets/videos/dj/dj4.mp4" type="video/mp4">
      </video>
      <div class="gig-reveal-hint">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16" fill="white" stroke="none"/></svg>
        <span>Click to reveal</span>
      </div>
      <div class="gig-card-label">Gig 04</div>
    </div>

    <div class="gig-card full-width" onclick="revealCard(this)">
      <video autoplay muted loop playsinline>
        <source src="../assets/videos/dj/dj5.mp4" type="video/mp4">
      </video>
      <div class="gig-reveal-hint">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16" fill="white" stroke="none"/></svg>
        <span>Click to reveal</span>
      </div>
      <div class="gig-card-label">Gig 05</div>
    </div>

  </div>

  <!-- AUDIO MIXES -->
  <div class="audio-section">

    <div class="section-label" style="padding-top: 0;">
      <h2>Mixes</h2>
      <p>Full sets you can stream</p>
    </div>

    <div class="audio-grid">

      <div class="audio-track">
        <div class="audio-track-info">
          <h3>Bonanza Move It</h3>
          <span>Mix</span>
        </div>
        <audio controls>
          <source src="../assets/videos/audio/bonanzamoveit.mp3" type="audio/mpeg">
        </audio>
      </div>

      <div class="audio-track">
        <div class="audio-track-info">
          <h3>Pull Me Out</h3>
          <span>Mix</span>
        </div>
        <audio controls>
          <source src="../assets/videos/audio/pullmeout.mp3" type="audio/mpeg">
        </audio>
      </div>

    </div>
  </div>

  <script src="../js/dj-gigs.js"></script>

</body>
</html>
